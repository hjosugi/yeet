name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GTK and layer-shell build dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libgtk-4-dev libwayland-dev wayland-protocols
          meson ninja-build
      - name: Build gtk4-layer-shell
        shell: bash
        run: |
          git clone --depth 1 --branch v1.3.0 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell \
            --prefix=/usr/local \
            -Dexamples=false -Ddocs=false -Dtests=false \
            -Dintrospection=false -Dvapi=false
          ninja -C /tmp/gtk4-layer-shell/build
          sudo ninja -C /tmp/gtk4-layer-shell/build install
          sudo ldconfig
      - run: cargo build --release --locked
      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
          test "$version" = "$cargo_version"
      - name: Stage archive
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          root="yeet-${version}-linux-x86_64"
          install -Dm755 target/release/yeet "$root/bin/yeet"
          install -Dm644 packaging/linux/io.github.hjosugi.Yeet.desktop "$root/share/applications/io.github.hjosugi.Yeet.desktop"
          install -Dm644 packaging/linux/io.github.hjosugi.Yeet.metainfo.xml "$root/share/metainfo/io.github.hjosugi.Yeet.metainfo.xml"
          install -Dm644 assets/io.github.hjosugi.Yeet.svg "$root/share/icons/hicolor/scalable/apps/io.github.hjosugi.Yeet.svg"
          install -Dm644 packaging/linux/yeet.1 "$root/share/man/man1/yeet.1"
          install -Dm644 LICENSE "$root/share/licenses/yeet/LICENSE"
          tar -czf "${root}.tar.gz" "$root"
          sha256sum "${root}.tar.gz" > SHA256SUMS-linux.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            yeet-*.tar.gz
            SHA256SUMS-linux.txt

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-rust
            zip
      - name: Build and bundle GTK runtime
        shell: msys2 {0}
        run: |
          cargo build --release --locked
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
          test "$version" = "$cargo_version"
          bash scripts/bundle-windows.sh
      - name: Detect optional signing configuration
        id: signing
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $hasCertificate = -not [string]::IsNullOrWhiteSpace($env:CERTIFICATE_BASE64)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:CERTIFICATE_PASSWORD)
          if ($hasCertificate -xor $hasPassword) {
            throw "Set both WINDOWS_SIGNING_CERTIFICATE_BASE64 and WINDOWS_SIGNING_CERTIFICATE_PASSWORD, or neither."
          }
          "enabled=$($hasCertificate.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
      - name: Sign portable executable
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $pfx = Join-Path $env:RUNNER_TEMP "yeet-signing-$([guid]::NewGuid()).pfx"
          try {
            $base64 = [regex]::Replace($env:CERTIFICATE_BASE64, '\s', '')
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($base64))
            $password = ConvertTo-SecureString $env:CERTIFICATE_PASSWORD -AsPlainText -Force
            ./packaging/windows/Sign-WindowsArtifacts.ps1 `
              -Path "yeet-$version-windows-x64/yeet.exe" `
              -CertificatePath $pfx -CertificatePassword $password
          }
          finally {
            Remove-Item -LiteralPath $pfx -Force -ErrorAction SilentlyContinue
          }
      - name: Archive portable build
        shell: msys2 {0}
        run: |
          version="${GITHUB_REF_NAME#v}"
          zip -r "yeet-${version}-windows-x64.zip" "yeet-${version}-windows-x64"
      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          choco install innosetup --yes --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" packaging/windows/yeet.iss
      - name: Sign Windows installer
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $pfx = Join-Path $env:RUNNER_TEMP "yeet-signing-$([guid]::NewGuid()).pfx"
          try {
            $base64 = [regex]::Replace($env:CERTIFICATE_BASE64, '\s', '')
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($base64))
            $password = ConvertTo-SecureString $env:CERTIFICATE_PASSWORD -AsPlainText -Force
            ./packaging/windows/Sign-WindowsArtifacts.ps1 `
              -Path "yeet-$version-windows-x64-setup.exe" `
              -CertificatePath $pfx -CertificatePassword $password
          }
          finally {
            Remove-Item -LiteralPath $pfx -Force -ErrorAction SilentlyContinue
          }
      - name: Generate and validate winget submission
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $installer = "yeet-$version-windows-x64-setup.exe"
          ./packaging/windows/New-WingetManifest.ps1 -Version $version -Installer $installer -OutputDirectory winget
          ./packaging/windows/Test-WingetManifest.ps1 -Version $version -ManifestDirectory winget -Installer $installer
          ./packaging/windows/New-WingetSubmission.ps1 -Version $version -ManifestDirectory winget -OutputDirectory winget-submission
          Compress-Archive -Path winget-submission/manifests `
            -DestinationPath "yeet-$version-winget-pkgs.zip" -Force
      - name: Write Windows checksums
        shell: msys2 {0}
        run: sha256sum yeet-*.zip yeet-*-setup.exe > SHA256SUMS-windows.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            yeet-*.zip
            yeet-*-setup.exe
            winget/*.yaml
            SHA256SUMS-windows.txt

  publish:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -d '' assets < <(find release -type f -print0)
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" "${assets[@]}" --repo "${{ github.repository }}" --clobber
          else
            gh release create "${{ github.ref_name }}" "${assets[@]}" \
              --repo "${{ github.repository }}" --verify-tag --generate-notes
          fi
