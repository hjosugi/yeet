name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  arch-metadata:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v5
      - name: Check generated SRCINFO files
        shell: bash
        run: |
          useradd --create-home builder
          for spec in "PKGBUILD:.SRCINFO" "PKGBUILD-git:.SRCINFO-git"; do
            pkgbuild="${spec%%:*}"
            srcinfo="${spec#*:}"
            generated="$(mktemp)"
            builddir="$(mktemp -d)"
            cp "packaging/arch/$pkgbuild" "$builddir/PKGBUILD"
            chown -R builder:builder "$builddir"
            su builder --shell /bin/bash --command \
              "cd '$builddir' && makepkg --printsrcinfo" \
              > "$generated"
            diff -u "packaging/arch/$srcinfo" "$generated"
          done

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - name: Check flake
        run: nix flake check --print-build-logs
      - name: Build default package
        run: nix build .#default --print-build-logs
      - name: Run default app
        run: nix run . -- --version

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install GTK and layer-shell build dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libgtk-4-dev libwayland-dev wayland-protocols
          meson ninja-build sway xvfb weston
      - name: Build gtk4-layer-shell
        shell: bash
        run: |
          git clone --depth 1 --branch v1.3.0 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell \
            --prefix=/usr/local \
            -Dexamples=false -Ddocs=false -Dtests=false \
            -Dintrospection=false -Dvapi=false
          ninja -C /tmp/gtk4-layer-shell/build
          sudo ninja -C /tmp/gtk4-layer-shell/build install
          sudo ldconfig
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --all-targets --locked
      - name: Build
        run: cargo build --release --locked
      - name: Release metadata consistency
        run: bash scripts/check-release-metadata.sh
      - name: Launch smoke test
        shell: bash
        run: |
          set +e
          xvfb-run -a timeout 5s ./target/release/yeet --hidden
          status=$?
          test "$status" -eq 124
      - name: Native Wayland smoke test
        shell: bash
        run: |
          runtime="$(mktemp -d)"
          chmod 700 "$runtime"
          XDG_RUNTIME_DIR="$runtime" weston --backend=headless-backend.so --socket=yeet-ci --idle-time=0 >/tmp/weston.log 2>&1 &
          weston_pid=$!
          trap 'kill $weston_pid || true; rm -rf "$runtime"' EXIT
          for _ in $(seq 1 50); do test -S "$runtime/yeet-ci" && break; sleep .1; done
          set +e
          XDG_RUNTIME_DIR="$runtime" WAYLAND_DISPLAY=yeet-ci GDK_BACKEND=wayland timeout 5s ./target/release/yeet --hidden
          status=$?
          test "$status" -eq 124
      - name: Layer-shell surface smoke test
        run: bash scripts/test-layer-shell-smoke.sh ./target/release/yeet
      - uses: actions/upload-artifact@v4
        with:
          name: yeet-linux
          path: target/release/yeet

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-rust
      - name: Test library
        shell: msys2 {0}
        run: cargo test --lib --locked
      - name: Build
        shell: msys2 {0}
        run: cargo build --release --locked
      - name: Launch smoke test
        shell: msys2 {0}
        run: ./target/release/yeet.exe --version | grep '^Yeet '
      - name: Assemble portable bundle
        shell: msys2 {0}
        run: bash scripts/bundle-windows.sh
      - name: Portable bundle runtime and topmost verification
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "([^"]+)"').Matches[0].Groups[1].Value
          $root = Join-Path $PWD "yeet-$version-windows-x64"
          # Launch the assembled bundle with only the bundle dir and System32 on
          # PATH, so the app must rely solely on the files we ship (no MSYS2
          # runtime). This proves the portable ZIP is self-contained: a missing
          # DLL, gdbus.exe or GTK resource would make yeet.exe exit early.
          $env:PATH = "$root;$env:SystemRoot\System32;$env:SystemRoot"
          ./scripts/Test-WindowsRuntime.ps1 -Executable (Join-Path $root "yeet.exe")
      - name: Validate winget packaging scripts
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "([^"]+)"').Matches[0].Groups[1].Value
          $manifestDirectory = Join-Path $env:RUNNER_TEMP "yeet-winget"
          $submissionDirectory = Join-Path $env:RUNNER_TEMP "yeet-winget-submission"
          ./packaging/windows/New-WingetManifest.ps1 `
            -Version $version -Installer target/release/yeet.exe -OutputDirectory $manifestDirectory
          ./packaging/windows/Test-WingetManifest.ps1 `
            -Version $version -ManifestDirectory $manifestDirectory -Installer target/release/yeet.exe
          ./packaging/windows/New-WingetSubmission.ps1 `
            -Version $version -ManifestDirectory $manifestDirectory -OutputDirectory $submissionDirectory
          $staged = Join-Path $submissionDirectory "manifests/h/hjosugi/Yeet/$version"
          if (@(Get-ChildItem -LiteralPath $staged -Filter '*.yaml').Count -ne 3) {
            throw "Expected three staged winget manifests."
          }
      - uses: actions/upload-artifact@v4
        with:
          name: yeet-windows
          path: target/release/yeet.exe
